<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sosmoov — Demo Access</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;700;900&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --p: #534AB7; --pd: #3C3489; --pl: #CECBF6; --pp: #EEEDFE;
  --o: #FF6B35; --nb: #1A1730; --ww: #F8F7FF; --wh: #FFFFFF;
  --t2: #444441; --tm: #888780; --bde: #CECBF6;
}
body {
  font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
  background: linear-gradient(135deg, var(--pp) 0%, #E8E6FF 60%, #F0EEF8 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.gate {
  background: var(--wh);
  border-radius: 20px;
  padding: 40px 36px;
  max-width: 400px;
  width: 100%;
  box-shadow: 0 20px 60px rgba(83,74,183,0.15);
  text-align: center;
}
.wordmark {
  font-family: 'Fredoka One', 'Arial Rounded MT Bold', Arial, sans-serif;
  font-size: 32px;
  line-height: 1;
  margin-bottom: 8px;
}
.wm-so  { color: var(--p); }
.wm-sm  { color: var(--o); }
.tagline {
  font-family: 'DM Mono', 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--tm);
  margin-bottom: 32px;
}
.gate-title {
  font-size: 16px;
  font-weight: 900;
  color: var(--nb);
  margin-bottom: 6px;
}
.gate-sub {
  font-size: 13px;
  color: var(--t2);
  margin-bottom: 24px;
  line-height: 1.5;
}
.input-wrap { position: relative; margin-bottom: 12px; }
.gate-input {
  width: 100%;
  padding: 12px 16px;
  border: 1.5px solid var(--bde);
  border-radius: 10px;
  font-family: 'DM Mono', 'Courier New', Courier, monospace;
  font-size: 14px;
  letter-spacing: 0.1em;
  color: var(--nb);
  background: var(--ww);
  outline: none;
  text-align: center;
  transition: border 120ms;
}
.gate-input:focus { border-color: var(--p); }
.gate-input.error { border-color: #E24B4A; }
.error-msg {
  font-family: 'DM Mono', 'Courier New', Courier, monospace;
  font-size: 10px;
  letter-spacing: 0.08em;
  color: #E24B4A;
  margin-bottom: 10px;
  display: none;
}
.error-msg.show { display: block; }
.gate-btn {
  width: 100%;
  padding: 12px;
  background: var(--p);
  color: #fff;
  border: none;
  border-radius: 10px;
  font-family: 'Nunito', 'Helvetica Neue', Arial, sans-serif;
  font-size: 14px;
  font-weight: 700;
  cursor: pointer;
  transition: background 120ms;
}
.gate-btn:hover { background: var(--pd); }
.gate-footer {
  margin-top: 24px;
  font-family: 'DM Mono', 'Courier New', Courier, monospace;
  font-size: 9px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--tm);
}
</style>
</head>
<body>
<div class="gate">
  <div class="wordmark"><span class="wm-so">so</span><span class="wm-sm">smoov</span></div>
  <div class="tagline">Your command center for transformation</div>
  <div class="gate-title">This is an early demo</div>
  <div class="gate-sub">You've been invited to preview Sosmoov before launch. Enter the access code Shira shared with you.</div>
  <div class="input-wrap">
    <input
      class="gate-input"
      id="gate-input"
      type="password"
      placeholder="Access code"
      autocomplete="off"
      onkeydown="if(event.key==='Enter')tryEnter()"
    />
  </div>
  <div class="error-msg" id="error-msg">Incorrect access code — try again</div>
  <button class="gate-btn" onclick="tryEnter()">Enter →</button>
  <div class="gate-footer">sosmoov.com · Seed stage · 2026</div>
</div>

<script>
// Change this to whatever password you want to use
var ACCESS_CODE = 'flywheel';

function tryEnter() {
  var input = document.getElementById('gate-input');
  var err   = document.getElementById('error-msg');
  if (input.value.toLowerCase().trim() === ACCESS_CODE) {
    // Store in sessionStorage so refreshing the demo page doesn't re-gate
    sessionStorage.setItem('sosmoov_access', '1');
    window.location.href = 'demo.html';
  } else {
    input.classList.add('error');
    err.classList.add('show');
    input.value = '';
    input.focus();
    setTimeout(function() {
      input.classList.remove('error');
    }, 600);
  }
}

// If they've already entered the code this session, skip the gate
if (sessionStorage.getItem('sosmoov_access') === '1') {
  window.location.href = 'demo.html';
}
</script>
</body>
</html>
